url: https://el-cordero.github.io/bluer-topo/
destination: pkgdown

template:
  bootstrap: 5
  bootswatch: flatly
  light-switch: true
  bslib:
    primary: "#005f73"
    base_font: system-ui
    heading_font: system-ui
    code_font: ui-monospace

home:
  title: "bluertopo"
  description: "Verified NOAA BlueTopo downloads and terra extraction for submerged terrain."
  sidebar: false

navbar:
  structure:
    left: [intro, reference, examples, articles, news]
    right: [search, github]
  components:
    intro:
      text: Get started
      href: articles/get-bluetopo.html
    examples:
      text: Examples
      menu:
        - text: Example gallery
          href: articles/examples.html
        - text: Discover tiles and coverage
          href: articles/example-discover-tiles.html
        - text: Download original assets
          href: articles/example-download-assets.html
        - text: Extract elevation with terra
          href: articles/example-extract-elevation.html
        - text: Compare resolution policies
          href: articles/example-resolution-policies.html
        - text: Mixed grids and output grid
          href: articles/example-mixed-grids.html
        - text: Layers and RAT metadata
          href: articles/example-layers-rat.html
    articles:
      text: Articles
      menu:
        - text: Get BlueTopo
          href: articles/get-bluetopo.html
        - text: Resolution policies
          href: articles/resolution-policies.html
        - text: Downloads, cache, and reproducibility
          href: articles/downloads-cache-reproducibility.html
        - text: Mixed UTM collections
          href: articles/mixed-utm-collections.html
        - text: Layers and RAT metadata
          href: articles/layers-rat-metadata.html

reference:
  - title: Core workflows
    desc: Discover, download, and open NOAA BlueTopo assets.
    contents:
      - bluertopo
      - bluertopo_download
      - bluertopo_tiles
  - title: Policies and cache
    desc: Configure native-resolution selection and package cache behavior.
    contents:
      - bluertopo_resolution
      - bluertopo_cache_dir
      - bluertopo_cache_clear

articles:
  - title: Examples
    navbar: Examples
    contents:
      - examples
      - example-discover-tiles
      - example-download-assets
      - example-extract-elevation
      - example-resolution-policies
      - example-mixed-grids
      - example-layers-rat
  - title: Guides
    navbar: Articles
    contents:
      - get-bluetopo
      - resolution-policies
      - downloads-cache-reproducibility
      - mixed-utm-collections
      - layers-rat-metadata

authors:
  "Elvin Cordero":
    href: https://github.com/el-cordero

development:
  mode: release
