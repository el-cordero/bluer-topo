name: pkgdown

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      BLUERTOPO_RUN_NETWORK_TESTS: "false"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: website
          extra-packages: any::pkgdown
      - name: Build pkgdown site
        run: Rscript -e 'pkgdown::build_site(new_process = FALSE, install = TRUE)'
      - name: Deploy pkgdown site
        run: Rscript -e 'pkgdown::deploy_to_branch(new_process = FALSE, install = TRUE, clean = FALSE)'
