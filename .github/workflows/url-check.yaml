name: URL-check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

jobs:
  url-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::urlchecker
      - name: URL check
        run: Rscript -e 'urlchecker::url_check()'
